<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>קליעות מהשלוש</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Heebo:wght@400;700;900&display=swap');

    :root {
      --orange: #ff6b00;
      --orange2: #ff9a3c;
      --dark: #0f0f1a;
      --card: #1a1a2e;
      --net: #e8e8e8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

    body {
      min-height: 100vh;
      background: var(--dark);
      background-image:
        radial-gradient(ellipse at 50% 0%, rgba(255,107,0,0.2) 0%, transparent 60%),
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.01) 40px, rgba(255,255,255,0.01) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.01) 40px, rgba(255,255,255,0.01) 41px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Heebo', sans-serif;
      direction: rtl; padding: 16px;
      overflow-x: hidden;
    }

    /* ─── LOBBY ─── */
    #lobby {
      background: var(--card);
      border-radius: 24px; padding: 36px 28px;
      border: 1px solid rgba(255,107,0,0.3);
      box-shadow: 0 0 60px rgba(255,107,0,0.15);
      text-align: center; max-width: 320px; width: 100%;
    }
    .lobby-icon { font-size: 3.5rem; margin-bottom: 8px; }
    .lobby-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 2.4rem; color: var(--orange);
      letter-spacing: 0.05em; margin-bottom: 4px;
      text-shadow: 0 0 30px rgba(255,107,0,0.5);
    }
    .lobby-sub { color: rgba(255,255,255,0.35); font-size: 0.8rem; margin-bottom: 28px; }

    .lobby-btn {
      width: 100%; padding: 15px; border-radius: 16px; border: none;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      font-family: 'Heebo', sans-serif; margin-bottom: 10px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .lobby-btn:hover { transform: translateY(-2px); }
    .btn-cpu {
      background: linear-gradient(135deg, var(--orange), #e65000);
      color: white; box-shadow: 0 4px 20px rgba(255,107,0,0.4);
    }
    .btn-friend {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .divider { display: flex; align-items: center; gap: 10px; margin: 4px 0 14px; color: rgba(255,255,255,0.2); font-size: 0.75rem; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.08); }
    .code-input {
      width: 100%; padding: 13px; border-radius: 14px;
      border: 2px solid rgba(255,107,0,0.3);
      background: rgba(255,255,255,0.05);
      font-size: 1.4rem; font-weight: 700; text-align: center;
      letter-spacing: 0.2em; font-family: 'Heebo', sans-serif;
      outline: none; direction: ltr; color: white; margin-bottom: 10px;
      transition: border-color 0.15s;
    }
    .code-input:focus { border-color: var(--orange); }
    .code-input::placeholder { font-size: 0.9rem; letter-spacing: 0.05em; color: rgba(255,255,255,0.2); }
    .btn-join {
      width: 100%; background: linear-gradient(135deg, var(--orange2), var(--orange));
      color: white; border: none; border-radius: 14px;
      padding: 13px; font-size: 1rem; font-weight: 700;
      cursor: pointer; font-family: 'Heebo', sans-serif;
      box-shadow: 0 4px 16px rgba(255,107,0,0.3);
      transition: transform 0.15s;
    }
    .btn-join:hover { transform: translateY(-2px); }
    #lobby-err { color: #ff6b6b; font-size: 0.8rem; margin-top: 8px; min-height: 18px; }

    /* ─── WAITING ─── */
    #waiting {
      background: var(--card); border-radius: 24px; padding: 36px 28px;
      border: 1px solid rgba(255,107,0,0.3);
      box-shadow: 0 0 60px rgba(255,107,0,0.15);
      text-align: center; max-width: 320px; width: 100%; display: none;
    }
    #waiting h2 { color: white; font-size: 1.1rem; margin-bottom: 8px; }
    .waiting-hint { color: rgba(255,255,255,0.35); font-size: 0.82rem; }
    .room-code-big {
      font-family: 'Bebas Neue', cursive;
      font-size: 4rem; color: var(--orange); direction: ltr;
      margin: 12px 0; text-shadow: 0 0 40px rgba(255,107,0,0.6);
      letter-spacing: 0.1em;
    }
    .spinner {
      width: 32px; height: 32px; border: 3px solid rgba(255,107,0,0.2);
      border-top-color: var(--orange); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 16px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .leave-btn {
      background: none; border: none; color: rgba(255,255,255,0.25);
      font-size: 0.78rem; cursor: pointer; font-family: inherit;
      text-decoration: underline; margin-top: 14px; display: block;
    }

    /* ─── GAME ─── */
    #game { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 400px; }

    .game-header { text-align: center; margin-bottom: 12px; }
    .game-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.8rem; color: var(--orange);
      letter-spacing: 0.05em;
    }
    .room-badge { font-size: 0.7rem; color: rgba(255,255,255,0.25); }
    .room-badge span { color: var(--orange); font-weight: 700; }

    /* Scoreboard */
    .scoreboard {
      display: flex; gap: 12px; width: 100%; margin-bottom: 14px;
    }
    .score-card {
      flex: 1; background: var(--card); border-radius: 16px;
      padding: 12px 8px; text-align: center;
      border: 1px solid rgba(255,255,255,0.06);
      transition: border-color 0.3s;
    }
    .score-card.active { border-color: var(--orange); box-shadow: 0 0 16px rgba(255,107,0,0.2); }
    .score-name { font-size: 0.65rem; color: rgba(255,255,255,0.4); margin-bottom: 2px; }
    .score-pts {
      font-family: 'Bebas Neue', cursive;
      font-size: 2.2rem; color: white; line-height: 1;
    }
    .score-shots { font-size: 0.6rem; color: rgba(255,255,255,0.3); margin-top: 2px; }

    /* Phase label */
    .phase-label {
      font-size: 0.75rem; color: rgba(255,255,255,0.4);
      margin-bottom: 10px; text-align: center; min-height: 18px;
    }

    /* Court */
    .court {
      width: 100%; max-width: 360px;
      background: #1a3a1a;
      border-radius: 20px; padding: 16px;
      border: 2px solid rgba(255,107,0,0.2);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      margin-bottom: 16px; position: relative;
      overflow: hidden;
    }
    .court::before {
      content: '';
      position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 180px; height: 90px;
      border: 2px solid rgba(255,255,255,0.08);
      border-bottom: none; border-radius: 90px 90px 0 0;
    }

    /* Hoop */
    .hoop-area {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 20px; position: relative;
    }
    .backboard {
      width: 80px; height: 14px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 4px; margin-bottom: 2px;
    }
    .rim {
      width: 54px; height: 8px;
      background: var(--orange);
      border-radius: 4px;
      box-shadow: 0 0 12px rgba(255,107,0,0.6);
      position: relative;
    }
    .net {
      width: 44px; height: 28px;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 6px,
        rgba(232,232,232,0.3) 6px, rgba(232,232,232,0.3) 7px
      ),
      repeating-linear-gradient(
        to right,
        transparent 0px, transparent 10px,
        rgba(232,232,232,0.25) 10px, rgba(232,232,232,0.25) 11px
      );
      border-left: 1px solid rgba(232,232,232,0.3);
      border-right: 1px solid rgba(232,232,232,0.3);
      clip-path: polygon(0 0, 100% 0, 85% 100%, 15% 100%);
    }

    /* Ball */
    .ball-area { display: flex; justify-content: center; margin: 10px 0 16px; position: relative; height: 70px; }
    .ball {
      width: 60px; height: 60px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ff8c42, #e65000, #8b2500);
      box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset -4px -4px 8px rgba(0,0,0,0.3);
      position: relative; cursor: pointer;
      transition: transform 0.1s;
      align-self: flex-end;
    }
    .ball::before {
      content: '';
      position: absolute; top: 50%; left: 0; right: 0; height: 2px;
      background: rgba(0,0,0,0.3); transform: translateY(-50%);
      border-radius: 50%;
    }
    .ball::after {
      content: '';
      position: absolute; left: 50%; top: 0; bottom: 0; width: 2px;
      background: rgba(0,0,0,0.3); transform: translateX(-50%);
      border-radius: 50%;
    }
    .ball.shooting { animation: shootBall 0.7s ease-out forwards; }
    .ball.missed  { animation: missBall 0.7s ease-in forwards; }

    @keyframes shootBall {
      0%   { transform: translateY(0) scale(1); opacity: 1; }
      40%  { transform: translateY(-140px) scale(0.7); opacity: 1; }
      70%  { transform: translateY(-160px) translateX(10px) scale(0.5); opacity: 1; }
      100% { transform: translateY(-80px) scale(0.3); opacity: 0; }
    }
    @keyframes missBall {
      0%   { transform: translateY(0) scale(1); }
      30%  { transform: translateY(-80px) scale(0.8); }
      100% { transform: translateY(20px) scale(0.9); opacity: 0; }
    }

    /* Power bar */
    .power-section { width: 100%; margin-bottom: 8px; }
    .power-label { font-size: 0.7rem; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 6px; }
    .power-track {
      width: 100%; height: 18px; background: rgba(255,255,255,0.07);
      border-radius: 9px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
    }
    .power-fill {
      height: 100%; width: 0%; border-radius: 9px;
      background: linear-gradient(90deg, #2ecc71, #f39c12, #e74c3c);
      transition: width 0.05s linear;
    }

    /* Shot button */
    .shot-btn {
      width: 100%; padding: 16px; border-radius: 18px; border: none;
      font-family: 'Bebas Neue', cursive; font-size: 1.6rem;
      letter-spacing: 0.05em; cursor: pointer;
      background: linear-gradient(135deg, var(--orange), #e65000);
      color: white; box-shadow: 0 4px 24px rgba(255,107,0,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
      user-select: none; -webkit-user-select: none;
    }
    .shot-btn:active { transform: scale(0.97); box-shadow: 0 2px 12px rgba(255,107,0,0.3); }
    .shot-btn:disabled { opacity: 0.4; cursor: default; }

    /* Result flash */
    .result-flash {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: 'Bebas Neue', cursive; font-size: 4rem;
      pointer-events: none; z-index: 100;
      animation: flashResult 1s ease-out forwards;
    }
    .result-flash.scored { color: #2ecc71; text-shadow: 0 0 30px rgba(46,204,113,0.8); }
    .result-flash.missed-txt { color: #e74c3c; text-shadow: 0 0 30px rgba(231,76,60,0.8); }
    @keyframes flashResult {
      0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
      40%  { opacity: 1; transform: translate(-50%, -60%) scale(1.1); }
      100% { opacity: 0; transform: translate(-50%, -80%) scale(0.8); }
    }

    /* Status */
    .status-area {
      min-height: 48px; display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
    }
    .status-pill {
      padding: 10px 20px; border-radius: 30px; font-size: 0.9rem; font-weight: 700;
      background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .status-win {
      padding: 12px 28px; border-radius: 30px; font-size: 1rem; font-weight: 800;
      background: linear-gradient(135deg, var(--orange), #e65000);
      color: white; box-shadow: 0 4px 20px rgba(255,107,0,0.4);
      animation: pop 0.4s cubic-bezier(.36,2,.4,.8);
    }
    .status-lose {
      padding: 12px 28px; border-radius: 30px; font-size: 1rem; font-weight: 800;
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: white; box-shadow: 0 4px 20px rgba(231,76,60,0.4);
      animation: pop 0.4s cubic-bezier(.36,2,.4,.8);
    }

    /* Next btn */
    .next-btn {
      width: 100%; padding: 14px; border-radius: 18px; border: none;
      font-family: 'Bebas Neue', cursive; font-size: 1.4rem; letter-spacing: 0.05em;
      background: rgba(255,255,255,0.08); color: white; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12); margin-bottom: 10px;
      transition: transform 0.15s, background 0.15s;
    }
    .next-btn:hover { background: rgba(255,255,255,0.13); transform: translateY(-2px); }

    /* Emoji bar */
    .emoji-bar { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
    .emoji-btn {
      width: 38px; height: 38px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04);
      font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s;
    }
    .emoji-btn:hover { transform: scale(1.2); }
    .emoji-bubble {
      position: fixed; bottom: 80px; font-size: 3rem; z-index: 999;
      animation: bubbleUp 2.5s ease-out forwards; pointer-events: none;
    }
    .emoji-bubble.mine { right: 30px; }
    .emoji-bubble.theirs { left: 30px; }
    @keyframes bubbleUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      80%  { opacity: 1; transform: translateY(-120px) scale(1.3); }
      100% { opacity: 0; transform: translateY(-160px) scale(0.8); }
    }

    @keyframes pop {
      0% { transform: scale(0.7); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Shots dots */
    .shots-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 10px; flex-wrap: wrap; }
    .dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2); background: transparent;
      transition: all 0.2s;
    }
    .dot.scored { background: #2ecc71; border-color: #2ecc71; box-shadow: 0 0 8px rgba(46,204,113,0.5); }
    .dot.missed { background: #e74c3c; border-color: #e74c3c; }
    .dot.current { border-color: var(--orange); box-shadow: 0 0 8px rgba(255,107,0,0.5); }
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="lobby-icon">🏀</div>
  <div class="lobby-title">קליעות מהשלוש</div>
  <div class="lobby-sub">6 זריקות לכל שחקן</div>
  <button class="lobby-btn btn-cpu" onclick="startVsCpu()">🤖 שחק נגד המחשב</button>
  <button class="lobby-btn btn-friend" onclick="startVsFriend()">🤝 צרף חבר</button>
  <div class="divider">יש לך קוד?</div>
  <input class="code-input" id="join-code" maxlength="4" placeholder="קוד חדר" oninput="this.value=this.value.replace(/\D/g,'')">
  <button class="btn-join" onclick="joinRoom()">הצטרף</button>
  <div id="lobby-err"></div>
</div>

<!-- WAITING -->
<div id="waiting">
  <h2>ממתין לשחקן שני...</h2>
  <div class="waiting-hint">שלח לחבר:</div>
  <div class="room-code-big" id="display-code"></div>
  <div class="waiting-hint">המשחק יתחיל אוטומטית</div>
  <div class="spinner"></div>
  <button class="leave-btn" onclick="leaveRoom()">בטל</button>
</div>

<!-- GAME -->
<div id="game">
  <div class="game-header">
    <div class="game-title">🏀 קליעות מהשלוש</div>
    <div class="room-badge">חדר: <span id="room-badge-code"></span></div>
  </div>

  <div class="scoreboard">
    <div class="score-card" id="score-card-me">
      <div class="score-name" id="score-name-me">אתה</div>
      <div class="score-pts" id="score-me">0</div>
      <div class="score-shots" id="shots-me"></div>
    </div>
    <div class="score-card" id="score-card-opp">
      <div class="score-name" id="score-name-opp">יריב</div>
      <div class="score-pts" id="score-opp">0</div>
      <div class="score-shots" id="shots-opp"></div>
    </div>
  </div>

  <div class="phase-label" id="phase-label"></div>
  <div class="status-area" id="status-area"></div>

  <div class="shots-dots" id="shots-dots"></div>

  <div class="court">
    <div class="hoop-area">
      <div class="backboard"></div>
      <div class="rim"></div>
      <div class="net"></div>
    </div>
    <div class="ball-area">
      <div class="ball" id="ball"></div>
    </div>
    <div class="power-section">
      <div class="power-label">עצמה</div>
      <div class="power-track"><div class="power-fill" id="power-fill"></div></div>
    </div>
  </div>

  <button class="shot-btn" id="shot-btn"
    onmousedown="startCharge()" onmouseup="releaseShot()"
    ontouchstart="startCharge(event)" ontouchend="releaseShot(event)">
    החזק לזרוק 🏀
  </button>

  <button class="next-btn" id="next-btn" onclick="nextRound()" style="display:none">▶ המשך</button>

  <div class="emoji-bar">
    <button class="emoji-btn" onclick="sendEmoji('🏀')">🏀</button>
    <button class="emoji-btn" onclick="sendEmoji('😂')">😂</button>
    <button class="emoji-btn" onclick="sendEmoji('🔥')">🔥</button>
    <button class="emoji-btn" onclick="sendEmoji('💀')">💀</button>
    <button class="emoji-btn" onclick="sendEmoji('😤')">😤</button>
    <button class="emoji-btn" onclick="sendEmoji('👏')">👏</button>
    <button class="emoji-btn" onclick="sendEmoji('🤡')">🤡</button>
    <button class="emoji-btn" onclick="sendEmoji('💩')">💩</button>
  </div>
  <button class="leave-btn" onclick="leaveRoom()">עזוב</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, update, remove }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD2SECYc_9V7NDASMzSzf0Se5OL6NyU8wA",
    authDomain: "priel-af970.firebaseapp.com",
    databaseURL: "https://priel-af970-default-rtdb.firebaseio.com",
    projectId: "priel-af970",
    storageBucket: "priel-af970.firebasestorage.app",
    messagingSenderId: "816586982849",
    appId: "1:816586982849:web:b991437452fffae36e5b40"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const TOTAL_SHOTS = 6;
  const OVERTIME_SHOTS = 3;
  // Sweet zone: power 35%-70% = score
  const SWEET_MIN = 32, SWEET_MAX = 72;

  let myRole = null; // 'X' or 'O'
  let roomCode = null;
  let unsubscribe = null;
  let lastEmojiTs = 0;
  let vsComputer = false;

  // Local state
  let charging = false;
  let power = 0;
  let chargeInterval = null;
  let shooting = false;
  let localState = null; // for vs CPU

  function randomCode() { return Math.floor(1000 + Math.random() * 9000).toString(); }

  function show(id) {
    ['lobby','waiting','game'].forEach(s => {
      const el = document.getElementById(s);
      el.style.display = s === id ? (id === 'game' ? 'flex' : 'block') : 'none';
    });
  }

  function newGameState() {
    return {
      status: 'playing',
      phase: 'X_shooting', // X_shooting, O_shooting, overtime_X, overtime_O, done
      shots: { X: [], O: [] },
      overtime: false,
    };
  }

  // ─── VS COMPUTER ───
  window.startVsCpu = function() {
    vsComputer = true;
    myRole = 'X';
    roomCode = null;
    localState = newGameState();
    show('game');
    document.getElementById('room-badge-code').textContent = 'מחשב 🤖';
    document.getElementById('score-name-me').textContent = 'אתה 🍓';
    document.getElementById('score-name-opp').textContent = 'מחשב 🤖';
    renderLocalGame();
  };

  // ─── VS FRIEND ───
  window.startVsFriend = async function() {
    let code;
    for (let i = 0; i < 10; i++) {
      code = randomCode();
      const snap = await get(ref(db, `rooms3/${code}`));
      if (!snap.exists()) break;
    }
    const state = newGameState();
    await set(ref(db, `rooms3/${code}`), { status: 'waiting', game: state, emoji: null });
    roomCode = code;
    myRole = 'X';
    document.getElementById('display-code').textContent = code;
    show('waiting');
    listenRoom();

    const url = `${location.origin}${location.pathname}?room=${code}`;
    const text = `בוא נשחק קליעות מהשלוש! לחץ להצטרף: ${url}`;
    if (navigator.share) {
      try { await navigator.share({ title: 'קליעות מהשלוש', text }); } catch(e) {}
    } else {
      await navigator.clipboard.writeText(text).catch(()=>{});
      alert('הלינק הועתק 📋');
    }
  };

  window.joinRoom = async function() {
    const code = document.getElementById('join-code').value.trim();
    const errEl = document.getElementById('lobby-err');
    if (code.length !== 4) { errEl.textContent = 'קוד חייב להיות 4 ספרות'; return; }
    const snap = await get(ref(db, `rooms3/${code}`));
    if (!snap.exists()) { errEl.textContent = 'חדר לא נמצא 🤷'; return; }
    if (snap.val().status !== 'waiting') { errEl.textContent = 'החדר כבר מלא'; return; }
    errEl.textContent = '';
    await update(ref(db, `rooms3/${code}`), { status: 'playing' });
    roomCode = code;
    myRole = 'O';
    show('game');
    initOnlineUI();
    listenRoom();
  };

  function listenRoom() {
    if (unsubscribe) unsubscribe();
    unsubscribe = onValue(ref(db, `rooms3/${roomCode}`), snap => {
      if (!snap.exists()) { leaveRoom(); return; }
      const data = snap.val();
      if (myRole === 'X' && data.status === 'playing' && document.getElementById('waiting').style.display !== 'none') {
        show('game');
        initOnlineUI();
      }
      if (document.getElementById('game').style.display !== 'none') {
        renderOnlineGame(data.game || newGameState());
        handleEmojiUpdate(data.emoji);
      }
    });
  }

  function initOnlineUI() {
    document.getElementById('room-badge-code').textContent = roomCode;
    document.getElementById('score-name-me').textContent = myRole === 'X' ? 'אתה 🍓 (ראשון)' : 'אתה 🍋 (שני)';
    document.getElementById('score-name-opp').textContent = myRole === 'X' ? 'יריב 🍋' : 'יריב 🍓';
  }

  // ─── SHOOTING MECHANICS ───
  window.startCharge = function(e) {
    if (e) e.preventDefault();
    if (shooting) return;
    const state = vsComputer ? localState : null;
    const phase = state ? state.phase : null;

    // Check if it's my turn
    if (!vsComputer) {
      // Will be checked in releaseShot via current game state
    }

    charging = true;
    power = 0;
    document.getElementById('power-fill').style.width = '0%';

    chargeInterval = setInterval(() => {
      if (!charging) return;
      power = Math.min(power + 2.5, 100);
      document.getElementById('power-fill').style.width = power + '%';
    }, 50);
  };

  window.releaseShot = function(e) {
    if (e) e.preventDefault();
    if (!charging) return;
    charging = false;
    clearInterval(chargeInterval);
    const finalPower = power;
    power = 0;
    document.getElementById('power-fill').style.width = '0%';

    if (vsComputer) {
      doLocalShot(finalPower);
    } else {
      doOnlineShot(finalPower);
    }
  };

  function isScored(p) {
    return p >= SWEET_MIN && p <= SWEET_MAX;
  }

  // ─── LOCAL (VS CPU) ───
  function doLocalShot(p) {
    const state = localState;
    if (!state || state.phase === 'done') return;
    const isMyTurn = state.phase === 'X_shooting' || state.phase === 'overtime_X';
    if (!isMyTurn) return;

    const scored = isScored(p);
    animateBall(scored, () => {
      state.shots.X.push(scored ? 1 : 0);
      const limit = state.overtime ? OVERTIME_SHOTS : TOTAL_SHOTS;

      if (state.shots.X.length >= limit) {
        // CPU's turn
        state.phase = state.overtime ? 'overtime_O' : 'O_shooting';
        renderLocalGame();
        setTimeout(cpuShoot, 1000);
      } else {
        renderLocalGame();
      }
    });
  }

  function cpuShoot() {
    const state = localState;
    if (!state) return;
    const limit = state.overtime ? OVERTIME_SHOTS : TOTAL_SHOTS;

    const doOne = () => {
      if (state.shots.O.length >= limit) {
        checkLocalWinner();
        return;
      }
      // CPU has ~55% hit rate
      const cpuPower = Math.random() < 0.55
        ? SWEET_MIN + Math.random() * (SWEET_MAX - SWEET_MIN)
        : (Math.random() < 0.5 ? Math.random() * SWEET_MIN : SWEET_MAX + Math.random() * (100 - SWEET_MAX));
      const scored = isScored(cpuPower);
      animateBall(scored, () => {
        state.shots.O.push(scored ? 1 : 0);
        renderLocalGame();
        if (state.shots.O.length < limit) setTimeout(doOne, 900);
        else { setTimeout(checkLocalWinner, 400); }
      });
    };
    doOne();
  }

  function checkLocalWinner() {
    const state = localState;
    const myScore = state.shots.X.reduce((a,b) => a+b, 0);
    const cpuScore = state.shots.O.reduce((a,b) => a+b, 0);

    if (myScore === cpuScore && !state.overtime) {
      // Overtime!
      state.overtime = true;
      state.phase = 'overtime_X';
      state.shots.X = [];
      state.shots.O = [];
      renderLocalGame();
      return;
    }
    state.phase = 'done';
    renderLocalGame();
  }

  function renderLocalGame() {
    const state = localState;
    if (!state) return;

    const myScore = state.shots.X.reduce((a,b) => a+b, 0);
    const cpuScore = state.shots.O.reduce((a,b) => a+b, 0);
    const limit = state.overtime ? OVERTIME_SHOTS : TOTAL_SHOTS;
    const isMyTurn = state.phase === 'X_shooting' || state.phase === 'overtime_X';
    const isCpuTurn = state.phase === 'O_shooting' || state.phase === 'overtime_O';
    const isDone = state.phase === 'done';

    document.getElementById('score-me').textContent = myScore;
    document.getElementById('score-opp').textContent = cpuScore;
    document.getElementById('shots-me').textContent = `${state.shots.X.length}/${limit}`;
    document.getElementById('shots-opp').textContent = `${state.shots.O.length}/${limit}`;

    document.getElementById('score-card-me').classList.toggle('active', isMyTurn);
    document.getElementById('score-card-opp').classList.toggle('active', isCpuTurn);

    const phaseEl = document.getElementById('phase-label');
    if (state.overtime) phaseEl.textContent = '⚡ הארכה!';
    else phaseEl.textContent = '';

    // Dots
    renderDots(state.shots.X, limit, isMyTurn && !isDone);

    const statusEl = document.getElementById('status-area');
    const nextBtn = document.getElementById('next-btn');
    const shotBtn = document.getElementById('shot-btn');

    if (isDone) {
      if (myScore > cpuScore) {
        statusEl.innerHTML = '<div class="status-win">🏆 ניצחת! המחשב ימשיך לחלום 😴</div>';
      } else if (cpuScore > myScore) {
        statusEl.innerHTML = '<div class="status-lose">😔 המחשב ניצח! תמשיך לחלום 😴</div>';
      } else {
        statusEl.innerHTML = '<div class="status-win">🤝 תיקו!</div>';
      }
      nextBtn.textContent = '🔄 משחק חדש';
      nextBtn.style.display = 'block';
      shotBtn.disabled = true;
    } else if (isMyTurn) {
      statusEl.innerHTML = '<div class="status-pill">👆 החזק וזרוק!</div>';
      shotBtn.disabled = false;
      nextBtn.style.display = 'none';
    } else {
      statusEl.innerHTML = '<div class="status-pill">🤖 המחשב זורק...</div>';
      shotBtn.disabled = true;
      nextBtn.style.display = 'none';
    }
  }

  // ─── ONLINE ───
  async function doOnlineShot(p) {
    const snap = await get(ref(db, `rooms3/${roomCode}/game`));
    const state = snap.val() || newGameState();
    const phase = state.phase;
    const isMyPhase = (myRole === 'X' && (phase === 'X_shooting' || phase === 'overtime_X')) ||
                      (myRole === 'O' && (phase === 'O_shooting' || phase === 'overtime_O'));
    if (!isMyPhase) return;

    const shots = state.shots || { X: [], O: [] };
    if (!Array.isArray(shots.X)) shots.X = Object.values(shots.X || {});
    if (!Array.isArray(shots.O)) shots.O = Object.values(shots.O || {});

    const limit = state.overtime ? OVERTIME_SHOTS : TOTAL_SHOTS;
    if (shots[myRole].length >= limit) return;

    const scored = isScored(p);
    animateBall(scored, async () => {
      shots[myRole].push(scored ? 1 : 0);
      let newPhase = phase;

      if (shots[myRole].length >= limit) {
        if (phase === 'X_shooting') newPhase = 'O_shooting';
        else if (phase === 'O_shooting') {
          const xs = shots.X.reduce((a,b)=>a+b,0);
          const os = shots.O.reduce((a,b)=>a+b,0);
          if (xs === os) { newPhase = 'overtime_X'; shots.X = []; shots.O = []; state.overtime = true; }
          else newPhase = 'done';
        }
        else if (phase === 'overtime_X') newPhase = 'overtime_O';
        else if (phase === 'overtime_O') newPhase = 'done';
      }

      await update(ref(db, `rooms3/${roomCode}/game`), { shots, phase: newPhase, overtime: state.overtime || false });
    });
  }

  function renderOnlineGame(state) {
    const shots = state.shots || { X: [], O: [] };
    const sx = Array.isArray(shots.X) ? shots.X : Object.values(shots.X || {});
    const so = Array.isArray(shots.O) ? shots.O : Object.values(shots.O || {});

    const myShots = myRole === 'X' ? sx : so;
    const oppShots = myRole === 'X' ? so : sx;
    const myScore = myShots.reduce((a,b)=>a+b,0);
    const oppScore = oppShots.reduce((a,b)=>a+b,0);
    const limit = state.overtime ? OVERTIME_SHOTS : TOTAL_SHOTS;

    const phase = state.phase || 'X_shooting';
    const isMyTurn = (myRole === 'X' && (phase === 'X_shooting' || phase === 'overtime_X')) ||
                     (myRole === 'O' && (phase === 'O_shooting' || phase === 'overtime_O'));
    const isDone = phase === 'done';

    document.getElementById('score-me').textContent = myScore;
    document.getElementById('score-opp').textContent = oppScore;
    document.getElementById('shots-me').textContent = `${myShots.length}/${limit}`;
    document.getElementById('shots-opp').textContent = `${oppShots.length}/${limit}`;
    document.getElementById('score-card-me').classList.toggle('active', isMyTurn);
    document.getElementById('score-card-opp').classList.toggle('active', !isMyTurn && !isDone);

    if (state.overtime) document.getElementById('phase-label').textContent = '⚡ הארכה!';
    else document.getElementById('phase-label').textContent = '';

    renderDots(myShots, limit, isMyTurn && !isDone);

    const statusEl = document.getElementById('status-area');
    const nextBtn = document.getElementById('next-btn');
    const shotBtn = document.getElementById('shot-btn');

    if (isDone) {
      if (myScore > oppScore) {
        statusEl.innerHTML = '<div class="status-win">🏆 ניצחת! החבר ימשיך לחלום 😴</div>';
      } else if (oppScore > myScore) {
        statusEl.innerHTML = '<div class="status-lose">😔 הפסדת! תמשיך לחלום 😴</div>';
      } else {
        statusEl.innerHTML = '<div class="status-win">🤝 תיקו!</div>';
      }
      nextBtn.textContent = '🔄 משחק חדש';
      nextBtn.style.display = 'block';
      shotBtn.disabled = true;
    } else if (isMyTurn) {
      statusEl.innerHTML = '<div class="status-pill">👆 החזק וזרוק!</div>';
      shotBtn.disabled = false;
      nextBtn.style.display = 'none';
    } else {
      const oppTurnText = (phase === 'X_shooting' || phase === 'overtime_X') ? '🍓' : '🍋';
      statusEl.innerHTML = `<div class="status-pill">⏳ ${oppTurnText} זורק...</div>`;
      shotBtn.disabled = true;
      nextBtn.style.display = 'none';
    }
  }

  function renderDots(shots, limit, showCurrent) {
    const el = document.getElementById('shots-dots');
    el.innerHTML = '';
    for (let i = 0; i < limit; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      if (i < shots.length) {
        dot.classList.add(shots[i] ? 'scored' : 'missed');
      } else if (i === shots.length && showCurrent) {
        dot.classList.add('current');
      }
      el.appendChild(dot);
    }
  }

  // ─── Ball animation ───
  function animateBall(scored, cb) {
    if (shooting) return;
    shooting = true;
    const ball = document.getElementById('ball');
    ball.className = 'ball ' + (scored ? 'shooting' : 'missed');

    // Flash result
    const flash = document.createElement('div');
    flash.className = 'result-flash ' + (scored ? 'scored' : 'missed-txt');
    flash.textContent = scored ? 'נכנס! 🎯' : 'פספוס!';
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 1000);

    setTimeout(() => {
      ball.className = 'ball';
      shooting = false;
      if (cb) cb();
    }, 750);
  }

  // ─── Next round ───
  window.nextRound = async function() {
    if (vsComputer) {
      localState = newGameState();
      document.getElementById('shot-btn').disabled = false;
      document.getElementById('next-btn').style.display = 'none';
      renderLocalGame();
    } else {
      const state = newGameState();
      await update(ref(db, `rooms3/${roomCode}`), { game: state, emoji: null });
    }
  };

  // ─── Emoji ───
  window.sendEmoji = async function(emoji) {
    if (vsComputer) {
      showEmojiBubble(emoji, true);
      return;
    }
    await update(ref(db, `rooms3/${roomCode}/emoji`), { value: emoji, from: myRole, ts: Date.now() });
  };

  function handleEmojiUpdate(data) {
    if (!data || !data.ts) return;
    if (data.ts <= lastEmojiTs) return;
    lastEmojiTs = data.ts;
    showEmojiBubble(data.value, data.from === myRole);
  }

  function showEmojiBubble(emoji, isMe) {
    const el = document.createElement('div');
    el.className = 'emoji-bubble ' + (isMe ? 'mine' : 'theirs');
    el.textContent = emoji;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }

  // ─── Leave ───
  window.leaveRoom = async function() {
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    if (roomCode) { await remove(ref(db, `rooms3/${roomCode}`)); roomCode = null; }
    myRole = null; vsComputer = false; localState = null;
    charging = false; shooting = false; clearInterval(chargeInterval);
    document.getElementById('lobby-err').textContent = '';
    history.replaceState({}, '', location.pathname);
    show('lobby');
  };

  // ─── Auto-join ───
  (async function() {
    const params = new URLSearchParams(location.search);
    const roomParam = params.get('room');
    if (!roomParam) return;
    const snap = await get(ref(db, `rooms3/${roomParam}`));
    const errEl = document.getElementById('lobby-err');
    if (!snap.exists()) { errEl.textContent = 'חדר לא נמצא'; history.replaceState({}, '', location.pathname); return; }
    if (snap.val().status !== 'waiting') { errEl.textContent = 'החדר כבר מלא'; history.replaceState({}, '', location.pathname); return; }
    await update(ref(db, `rooms3/${roomParam}`), { status: 'playing' });
    roomCode = roomParam;
    myRole = 'O';
    history.replaceState({}, '', location.pathname);
    show('game');
    initOnlineUI();
    listenRoom();
  })();
</script>
</body>
</html>
