<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>קליעות מהשלוש</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Heebo:wght@400;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

    body {
      min-height: 100vh;
      background: #0f0f1a;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(255,107,0,0.18) 0%, transparent 65%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      font-family: 'Heebo', sans-serif;
      direction: rtl; padding: 12px 12px 20px;
      overflow-x: hidden;
    }

    /* ─── LOBBY ─── */
    #lobby {
      background: #1a1a2e; border-radius: 24px; padding: 36px 28px;
      border: 1px solid rgba(255,107,0,0.3);
      box-shadow: 0 0 60px rgba(255,107,0,0.15);
      text-align: center; max-width: 320px; width: 100%;
      margin-top: 60px;
    }
    .lobby-icon { font-size: 3.5rem; margin-bottom: 8px; }
    .lobby-title {
      font-family: 'Bebas Neue', cursive; font-size: 2.4rem; color: #ff6b00;
      letter-spacing: 0.05em; margin-bottom: 4px;
      text-shadow: 0 0 30px rgba(255,107,0,0.5);
    }
    .lobby-sub { color: rgba(255,255,255,0.35); font-size: 0.8rem; margin-bottom: 28px; }
    .lobby-btn {
      width: 100%; padding: 15px; border-radius: 16px; border: none;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      font-family: 'Heebo', sans-serif; margin-bottom: 10px;
      transition: transform 0.15s;
    }
    .lobby-btn:hover { transform: translateY(-2px); }
    .btn-cpu { background: linear-gradient(135deg, #ff6b00, #e65000); color: white; box-shadow: 0 4px 20px rgba(255,107,0,0.4); }
    .btn-friend { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.1); }
    .divider { display: flex; align-items: center; gap: 10px; margin: 4px 0 14px; color: rgba(255,255,255,0.2); font-size: 0.75rem; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.08); }
    .code-input {
      width: 100%; padding: 13px; border-radius: 14px;
      border: 2px solid rgba(255,107,0,0.3); background: rgba(255,255,255,0.05);
      font-size: 1.4rem; font-weight: 700; text-align: center;
      letter-spacing: 0.2em; font-family: 'Heebo', sans-serif;
      outline: none; direction: ltr; color: white; margin-bottom: 10px;
    }
    .code-input:focus { border-color: #ff6b00; }
    .code-input::placeholder { font-size: 0.9rem; letter-spacing: 0.05em; color: rgba(255,255,255,0.2); }
    .btn-join {
      width: 100%; background: linear-gradient(135deg, #ff9a3c, #ff6b00);
      color: white; border: none; border-radius: 14px;
      padding: 13px; font-size: 1rem; font-weight: 700;
      cursor: pointer; font-family: 'Heebo', sans-serif;
    }
    #lobby-err { color: #ff6b6b; font-size: 0.8rem; margin-top: 8px; min-height: 18px; }

    /* ─── WAITING ─── */
    #waiting {
      background: #1a1a2e; border-radius: 24px; padding: 36px 28px;
      border: 1px solid rgba(255,107,0,0.3); text-align: center;
      max-width: 320px; width: 100%; display: none; margin-top: 60px;
    }
    #waiting h2 { color: white; font-size: 1.1rem; margin-bottom: 8px; }
    .waiting-hint { color: rgba(255,255,255,0.35); font-size: 0.82rem; }
    .room-code-big {
      font-family: 'Bebas Neue', cursive; font-size: 4rem; color: #ff6b00;
      direction: ltr; margin: 12px 0; text-shadow: 0 0 40px rgba(255,107,0,0.6);
      letter-spacing: 0.1em;
    }
    .spinner {
      width: 32px; height: 32px; border: 3px solid rgba(255,107,0,0.2);
      border-top-color: #ff6b00; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 16px auto 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .leave-btn {
      background: none; border: none; color: rgba(255,255,255,0.25);
      font-size: 0.78rem; cursor: pointer; font-family: inherit;
      text-decoration: underline; margin-top: 14px; display: block;
    }

    /* ─── GAME ─── */
    #game {
      display: none; flex-direction: column;
      align-items: center; width: 100%; max-width: 420px;
    }

    .game-header { text-align: center; margin-bottom: 8px; margin-top: 4px; }
    .game-title {
      font-family: 'Bebas Neue', cursive; font-size: 1.6rem; color: #ff6b00;
      letter-spacing: 0.05em;
    }
    .room-badge { font-size: 0.65rem; color: rgba(255,255,255,0.25); }
    .room-badge span { color: #ff6b00; }

    /* Scoreboard — compact */
    .scoreboard {
      display: flex; gap: 10px; width: 100%; margin-bottom: 8px;
    }
    .score-card {
      flex: 1; background: #1a1a2e; border-radius: 14px;
      padding: 8px 6px; text-align: center;
      border: 1px solid rgba(255,255,255,0.06);
      transition: border-color 0.3s;
    }
    .score-card.active { border-color: #ff6b00; box-shadow: 0 0 12px rgba(255,107,0,0.2); }
    .score-name { font-size: 0.6rem; color: rgba(255,255,255,0.4); margin-bottom: 1px; }
    .score-pts { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; color: white; line-height: 1; }
    .score-shots { font-size: 0.55rem; color: rgba(255,255,255,0.3); margin-top: 1px; }

    /* Position indicator */
    .position-bar {
      display: flex; gap: 8px; justify-content: center;
      margin-bottom: 8px; width: 100%;
    }
    .pos-item {
      flex: 1; padding: 6px 4px; border-radius: 10px; text-align: center;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      font-size: 0.65rem; color: rgba(255,255,255,0.3); transition: all 0.3s;
    }
    .pos-item.active {
      background: rgba(255,107,0,0.15); border-color: #ff6b00;
      color: #ff6b00; font-weight: 700;
    }
    .pos-item.done {
      background: rgba(46,204,113,0.1); border-color: rgba(46,204,113,0.4);
      color: rgba(46,204,113,0.7);
    }
    .pos-label { font-size: 0.75rem; margin-bottom: 2px; }
    .pos-dots { display: flex; gap: 3px; justify-content: center; }
    .pos-dot {
      width: 8px; height: 8px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2); background: transparent;
    }
    .pos-dot.in { background: #2ecc71; border-color: #2ecc71; }
    .pos-dot.out { background: #e74c3c; border-color: #e74c3c; }
    .pos-dot.cur { border-color: #ff6b00; box-shadow: 0 0 6px rgba(255,107,0,0.6); }

    /* Status */
    .status-area {
      min-height: 38px; display: flex; align-items: center; justify-content: center;
      margin-bottom: 8px;
    }
    .status-pill {
      padding: 8px 18px; border-radius: 30px; font-size: 0.85rem; font-weight: 700;
      background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .status-win {
      padding: 10px 24px; border-radius: 30px; font-size: 0.95rem; font-weight: 800;
      background: linear-gradient(135deg, #ff6b00, #e65000); color: white;
      box-shadow: 0 4px 20px rgba(255,107,0,0.4);
      animation: pop 0.4s cubic-bezier(.36,2,.4,.8);
    }
    .status-lose {
      padding: 10px 24px; border-radius: 30px; font-size: 0.95rem; font-weight: 800;
      background: linear-gradient(135deg, #e74c3c, #c0392b); color: white;
      animation: pop 0.4s cubic-bezier(.36,2,.4,.8);
    }

    /* ─── COURT ─── */
    .court-wrap { width: 100%; position: relative; margin-bottom: 10px; }

    canvas#court { width: 100%; border-radius: 18px; display: block; }

    /* Power bar */
    .power-section { width: 100%; margin-bottom: 8px; }
    .power-label { font-size: 0.65rem; color: rgba(255,255,255,0.35); text-align: center; margin-bottom: 4px; }
    .power-track {
      width: 100%; height: 16px; background: rgba(255,255,255,0.07);
      border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08);
    }
    .power-fill {
      height: 100%; width: 0%; border-radius: 8px;
      background: linear-gradient(90deg, #2ecc71 0%, #f39c12 50%, #e74c3c 100%);
      transition: width 0.04s linear;
    }

    /* Shot button */
    .shot-btn {
      width: 100%; padding: 16px; border-radius: 18px; border: none;
      font-family: 'Bebas Neue', cursive; font-size: 1.6rem; letter-spacing: 0.05em;
      cursor: pointer; background: linear-gradient(135deg, #ff6b00, #e65000);
      color: white; box-shadow: 0 4px 24px rgba(255,107,0,0.4);
      transition: transform 0.1s; user-select: none; -webkit-user-select: none;
      margin-bottom: 8px;
    }
    .shot-btn:active { transform: scale(0.97); }
    .shot-btn:disabled { opacity: 0.35; cursor: default; }

    .next-btn {
      width: 100%; padding: 13px; border-radius: 16px; border: none;
      font-family: 'Bebas Neue', cursive; font-size: 1.3rem; letter-spacing: 0.05em;
      background: rgba(255,255,255,0.08); color: white; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12); margin-bottom: 8px;
      transition: transform 0.15s;
    }
    .next-btn:hover { transform: translateY(-2px); }

    /* Result flash */
    .result-flash {
      position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
      font-family: 'Bebas Neue', cursive; font-size: 4rem;
      pointer-events: none; z-index: 100;
      animation: flashResult 1s ease-out forwards;
    }
    .result-flash.scored { color: #2ecc71; text-shadow: 0 0 30px rgba(46,204,113,0.8); }
    .result-flash.missed-txt { color: #e74c3c; text-shadow: 0 0 30px rgba(231,76,60,0.8); }
    @keyframes flashResult {
      0%   { opacity: 1; transform: translate(-50%,-50%) scale(0.5); }
      40%  { opacity: 1; transform: translate(-50%,-65%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%,-90%) scale(0.8); }
    }

    /* Emoji */
    .emoji-bar { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; margin-bottom: 8px; }
    .emoji-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04);
      font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s;
    }
    .emoji-btn:hover { transform: scale(1.2); }
    .emoji-bubble {
      position: fixed; bottom: 80px; font-size: 3rem; z-index: 999;
      animation: bubbleUp 2.5s ease-out forwards; pointer-events: none;
    }
    .emoji-bubble.mine { right: 30px; }
    .emoji-bubble.theirs { left: 30px; }
    @keyframes bubbleUp {
      0%   { opacity:1; transform:translateY(0) scale(1); }
      80%  { opacity:1; transform:translateY(-120px) scale(1.3); }
      100% { opacity:0; transform:translateY(-160px) scale(0.8); }
    }
    @keyframes pop {
      0% { transform:scale(0.7); opacity:0; }
      70% { transform:scale(1.1); }
      100% { transform:scale(1); opacity:1; }
    }
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="lobby-icon">🏀</div>
  <div class="lobby-title">קליעות מהשלוש</div>
  <div class="lobby-sub">3 עמדות × 3 זריקות = 9 סה"כ</div>
  <button class="lobby-btn btn-cpu" onclick="startVsCpu()">🤖 שחק נגד המחשב</button>
  <button class="lobby-btn btn-friend" onclick="startVsFriend()">🤝 צרף חבר</button>
  <div class="divider">יש לך קוד?</div>
  <input class="code-input" id="join-code" maxlength="4" placeholder="קוד חדר" oninput="this.value=this.value.replace(/\D/g,'')">
  <button class="btn-join" onclick="joinRoom()">הצטרף</button>
  <div id="lobby-err"></div>
</div>

<!-- WAITING -->
<div id="waiting">
  <h2>ממתין לשחקן שני...</h2>
  <div class="waiting-hint">שלח לחבר:</div>
  <div class="room-code-big" id="display-code"></div>
  <div class="waiting-hint">המשחק יתחיל אוטומטית</div>
  <div class="spinner"></div>
  <button class="leave-btn" onclick="leaveRoom()">בטל</button>
</div>

<!-- GAME -->
<div id="game">
  <div class="game-header">
    <div class="game-title">🏀 קליעות מהשלוש</div>
    <div class="room-badge">חדר: <span id="room-badge-code"></span></div>
  </div>

  <div class="scoreboard">
    <div class="score-card" id="score-card-me">
      <div class="score-name" id="score-name-me">אתה</div>
      <div class="score-pts" id="score-me">0</div>
      <div class="score-shots" id="shots-me">0/9</div>
    </div>
    <div class="score-card" id="score-card-opp">
      <div class="score-name" id="score-name-opp">יריב</div>
      <div class="score-pts" id="score-opp">0</div>
      <div class="score-shots" id="shots-opp">0/9</div>
    </div>
  </div>

  <!-- Position bar -->
  <div class="position-bar" id="position-bar">
    <div class="pos-item" id="pos-0">
      <div class="pos-label">◀ שמאל</div>
      <div class="pos-dots" id="dots-0">
        <div class="pos-dot"></div><div class="pos-dot"></div><div class="pos-dot"></div>
      </div>
    </div>
    <div class="pos-item" id="pos-1">
      <div class="pos-label">▲ מרכז</div>
      <div class="pos-dots" id="dots-1">
        <div class="pos-dot"></div><div class="pos-dot"></div><div class="pos-dot"></div>
      </div>
    </div>
    <div class="pos-item" id="pos-2">
      <div class="pos-label">▶ ימין</div>
      <div class="pos-dots" id="dots-2">
        <div class="pos-dot"></div><div class="pos-dot"></div><div class="pos-dot"></div>
      </div>
    </div>
  </div>

  <div class="status-area" id="status-area"></div>

  <!-- Court canvas -->
  <div class="court-wrap">
    <canvas id="court" width="400" height="320"></canvas>
  </div>

  <div class="power-section">
    <div class="power-label">עצמה — תפסיק בירוק!</div>
    <div class="power-track"><div class="power-fill" id="power-fill"></div></div>
  </div>

  <button class="shot-btn" id="shot-btn"
    onmousedown="startCharge()" onmouseup="releaseShot()"
    ontouchstart="startCharge(event)" ontouchend="releaseShot(event)">
    החזק לזרוק 🏀
  </button>

  <button class="next-btn" id="next-btn" onclick="nextRound()" style="display:none">▶ המשך</button>

  <div class="emoji-bar">
    <button class="emoji-btn" onclick="sendEmoji('🏀')">🏀</button>
    <button class="emoji-btn" onclick="sendEmoji('😂')">😂</button>
    <button class="emoji-btn" onclick="sendEmoji('🔥')">🔥</button>
    <button class="emoji-btn" onclick="sendEmoji('💀')">💀</button>
    <button class="emoji-btn" onclick="sendEmoji('😤')">😤</button>
    <button class="emoji-btn" onclick="sendEmoji('👏')">👏</button>
    <button class="emoji-btn" onclick="sendEmoji('🤡')">🤡</button>
    <button class="emoji-btn" onclick="sendEmoji('💩')">💩</button>
  </div>
  <button class="leave-btn" onclick="leaveRoom()">עזוב</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, update, remove }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD2SECYc_9V7NDASMzSzf0Se5OL6NyU8wA",
    authDomain: "priel-af970.firebaseapp.com",
    databaseURL: "https://priel-af970-default-rtdb.firebaseio.com",
    projectId: "priel-af970",
    storageBucket: "priel-af970.firebasestorage.app",
    messagingSenderId: "816586982849",
    appId: "1:816586982849:web:b991437452fffae36e5b40"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const SHOTS_PER_POS = 3;
  const POSITIONS = ['שמאל','מרכז','ימין'];
  const SWEET_MIN = 33, SWEET_MAX = 70;
  // Difficulty per position: center easiest, sides harder
  const POS_SWEET = [
    { min: 38, max: 65 }, // left — slightly harder
    { min: 33, max: 70 }, // center — easiest
    { min: 38, max: 65 }, // right — slightly harder
  ];

  let myRole = null;
  let roomCode = null;
  let unsubscribe = null;
  let lastEmojiTs = 0;
  let vsComputer = false;
  let charging = false;
  let power = 0;
  let chargeInterval = null;
  let shooting = false;
  let localState = null;

  // ─── Canvas court ───
  const canvas = document.getElementById('court');
  const ctx = canvas.getContext('2d');
  let ballAnim = null;
  let ballX = 200, ballY = 240, ballSize = 28;
  let currentPos = 0; // 0=left,1=center,2=right

  const BALL_START_X = [100, 200, 300];
  const BALL_START_Y = 260;

  function drawCourt(posIdx, animBall) {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    // Floor
    const floorGrad = ctx.createLinearGradient(0, 0, 0, H);
    floorGrad.addColorStop(0, '#1a4a1a');
    floorGrad.addColorStop(1, '#0d2e0d');
    ctx.fillStyle = floorGrad;
    ctx.roundRect(0, 0, W, H, 18);
    ctx.fill();

    // Court lines
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1.5;

    // Half circle (3-point arc) — correct orientation, opening facing DOWN
    ctx.beginPath();
    ctx.arc(W/2, 10, 200, 0.1 * Math.PI, 0.9 * Math.PI);
    ctx.stroke();

    // Side lines
    ctx.beginPath();
    ctx.moveTo(20, 0); ctx.lineTo(20, H * 0.6);
    ctx.moveTo(W-20, 0); ctx.lineTo(W-20, H * 0.6);
    ctx.stroke();

    // Paint (key)
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.strokeRect(W/2 - 50, 0, 100, 100);

    // Backboard
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(W/2 - 40, 8, 80, 10);

    // Rim
    ctx.strokeStyle = '#ff6b00';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.ellipse(W/2, 50, 24, 8, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Net
    ctx.strokeStyle = 'rgba(220,220,220,0.4)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      ctx.beginPath();
      const x1 = W/2 - 22 + i * 11;
      const x2 = W/2 - 14 + i * 7;
      ctx.moveTo(x1, 54); ctx.lineTo(x2, 80);
      ctx.stroke();
    }
    for (let j = 0; j < 3; j++) {
      ctx.beginPath();
      ctx.moveTo(W/2 - 22 + j * 0, 54 + j * 8);
      ctx.lineTo(W/2 + 22 - j * 0, 54 + j * 8);
      ctx.stroke();
    }

    // Position markers on 3-point line
    const posAngles = [0.75 * Math.PI, 0.5 * Math.PI, 0.25 * Math.PI];
    posAngles.forEach((angle, i) => {
      const px = W/2 + 200 * Math.cos(angle);
      const py = 10 + 200 * Math.sin(angle);
      ctx.beginPath();
      ctx.arc(px, py, 7, 0, Math.PI * 2);
      ctx.fillStyle = i === posIdx ? '#ff6b00' : 'rgba(255,255,255,0.2)';
      ctx.fill();
      if (i === posIdx) {
        ctx.strokeStyle = '#ff9a3c';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    });

    // Ball
    if (animBall) {
      drawBall(ballX, ballY, ballSize);
    } else {
      const bx = BALL_START_X[posIdx];
      drawBall(bx, BALL_START_Y, 28);
    }
  }

  function drawBall(x, y, size) {
    const grad = ctx.createRadialGradient(x - size*0.3, y - size*0.3, size*0.1, x, y, size);
    grad.addColorStop(0, '#ff9a3c');
    grad.addColorStop(0.6, '#e65000');
    grad.addColorStop(1, '#7a2200');
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    // Lines
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x - size, y); ctx.lineTo(x + size, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y - size); ctx.lineTo(x, y + size);
    ctx.stroke();
  }

  function animateShot(posIdx, scored, cb) {
    if (ballAnim) cancelAnimationFrame(ballAnim);
    const startX = BALL_START_X[posIdx];
    const startY = BALL_START_Y;
    const rimX = canvas.width / 2;
    const rimY = 50;
    let t = 0;

    const animate = () => {
      t += 0.035;
      if (t >= 1) {
        drawCourt(posIdx, false);
        if (cb) cb();
        return;
      }
      const x = startX + (rimX - startX) * t;
      const arc = Math.sin(t * Math.PI) * 160;
      const y = startY + (rimY - startY) * t - arc;
      const size = 28 - t * 10;
      ballX = x; ballY = y; ballSize = size;

      if (scored && t > 0.85) {
        // Ball goes through net
        drawCourt(posIdx, true);
      } else if (!scored && t > 0.7) {
        // Ball bounces away
        const bx = rimX + (startX < rimX ? -60 : 60) * (t - 0.7) * 3;
        const by = rimY + 80 * (t - 0.7) * 3;
        drawCourt(posIdx, false);
        drawBall(bx, by, size);
      } else {
        drawCourt(posIdx, true);
      }
      ballAnim = requestAnimationFrame(animate);
    };
    animate();
  }

  function show(id) {
    ['lobby','waiting','game'].forEach(s => {
      const el = document.getElementById(s);
      el.style.display = s === id ? (id === 'game' ? 'flex' : 'block') : 'none';
    });
  }

  function newGameState() {
    return {
      phase: 'X_shooting',
      shots: { X: [], O: [] },
      overtime: false,
    };
  }

  function isScored(p, posIdx) {
    const sw = POS_SWEET[posIdx];
    return p >= sw.min && p <= sw.max;
  }

  // ─── VS CPU ───
  window.startVsCpu = function() {
    vsComputer = true; myRole = 'X'; roomCode = null;
    localState = newGameState();
    show('game');
    document.getElementById('room-badge-code').textContent = 'מחשב 🤖';
    document.getElementById('score-name-me').textContent = 'אתה 🍓';
    document.getElementById('score-name-opp').textContent = 'מחשב 🤖';
    renderLocalGame();
  };

  // ─── VS FRIEND ───
  window.startVsFriend = async function() {
    let code;
    for (let i = 0; i < 10; i++) {
      code = Math.floor(1000 + Math.random() * 9000).toString();
      const snap = await get(ref(db, `rooms3/${code}`));
      if (!snap.exists()) break;
    }
    const state = newGameState();
    await set(ref(db, `rooms3/${code}`), { status: 'waiting', game: state, emoji: null });
    roomCode = code; myRole = 'X';
    document.getElementById('display-code').textContent = code;
    show('waiting');
    listenRoom();
    const url = `${location.origin}${location.pathname}?room=${code}`;
    const text = `בוא נשחק קליעות מהשלוש! ${url}`;
    if (navigator.share) { try { await navigator.share({ title: 'קליעות', text }); } catch(e){} }
    else { await navigator.clipboard.writeText(text).catch(()=>{}); alert('הלינק הועתק 📋'); }
  };

  window.joinRoom = async function() {
    const code = document.getElementById('join-code').value.trim();
    const errEl = document.getElementById('lobby-err');
    if (code.length !== 4) { errEl.textContent = 'קוד חייב להיות 4 ספרות'; return; }
    const snap = await get(ref(db, `rooms3/${code}`));
    if (!snap.exists()) { errEl.textContent = 'חדר לא נמצא 🤷'; return; }
    if (snap.val().status !== 'waiting') { errEl.textContent = 'החדר כבר מלא'; return; }
    errEl.textContent = '';
    await update(ref(db, `rooms3/${code}`), { status: 'playing' });
    roomCode = code; myRole = 'O';
    show('game'); initOnlineUI(); listenRoom();
  };

  function listenRoom() {
    if (unsubscribe) unsubscribe();
    unsubscribe = onValue(ref(db, `rooms3/${roomCode}`), snap => {
      if (!snap.exists()) { leaveRoom(); return; }
      const data = snap.val();
      if (myRole === 'X' && data.status === 'playing' && document.getElementById('waiting').style.display !== 'none') {
        show('game'); initOnlineUI();
      }
      if (document.getElementById('game').style.display !== 'none') {
        renderOnlineGame(data.game || newGameState());
        handleEmojiUpdate(data.emoji);
      }
    });
  }

  function initOnlineUI() {
    document.getElementById('room-badge-code').textContent = roomCode;
    document.getElementById('score-name-me').textContent = myRole === 'X' ? 'אתה 🍓' : 'אתה 🍋';
    document.getElementById('score-name-opp').textContent = myRole === 'X' ? 'יריב 🍋' : 'יריב 🍓';
  }

  // ─── SHOOTING ───
  window.startCharge = function(e) {
    if (e) e.preventDefault();
    if (shooting) return;
    charging = true; power = 0;
    document.getElementById('power-fill').style.width = '0%';
    chargeInterval = setInterval(() => {
      if (!charging) return;
      power = Math.min(power + 2.5, 100);
      document.getElementById('power-fill').style.width = power + '%';
    }, 50);
  };

  window.releaseShot = function(e) {
    if (e) e.preventDefault();
    if (!charging) return;
    charging = false; clearInterval(chargeInterval);
    const p = power; power = 0;
    document.getElementById('power-fill').style.width = '0%';
    if (vsComputer) doLocalShot(p);
    else doOnlineShot(p);
  };

  function getPosIndex(shots) {
    return Math.min(Math.floor(shots / SHOTS_PER_POS), 2);
  }

  // ─── LOCAL ───
  function doLocalShot(p) {
    const state = localState;
    if (!state || state.phase === 'done') return;
    const isMyTurn = state.phase === 'X_shooting' || state.phase === 'overtime_X';
    if (!isMyTurn || shooting) return;

    const posIdx = state.overtime ? 1 : getPosIndex(state.shots.X.length);
    const scored = isScored(p, posIdx);

    shooting = true;
    showFlash(scored);
    animateShot(posIdx, scored, () => {
      shooting = false;
      state.shots.X.push(scored ? 1 : 0);
      const limit = state.overtime ? SHOTS_PER_POS : SHOTS_PER_POS * 3;
      if (state.shots.X.length >= limit) {
        state.phase = state.overtime ? 'overtime_O' : 'O_shooting';
        renderLocalGame();
        setTimeout(cpuShoot, 800);
      } else {
        renderLocalGame();
      }
    });
  }

  function cpuShoot() {
    const state = localState;
    if (!state) return;
    const limit = state.overtime ? SHOTS_PER_POS : SHOTS_PER_POS * 3;

    const doOne = () => {
      if (state.shots.O.length >= limit) { setTimeout(checkLocalWinner, 300); return; }
      const posIdx = state.overtime ? 1 : getPosIndex(state.shots.O.length);
      const sw = POS_SWEET[posIdx];
      const cpuP = Math.random() < 0.50
        ? sw.min + Math.random() * (sw.max - sw.min)
        : (Math.random() < 0.5 ? Math.random() * sw.min : sw.max + Math.random() * (100 - sw.max));
      const scored = isScored(cpuP, posIdx);
      showFlash(scored);
      animateShot(posIdx, scored, () => {
        state.shots.O.push(scored ? 1 : 0);
        renderLocalGame();
        setTimeout(doOne, 900);
      });
    };
    doOne();
  }

  function checkLocalWinner() {
    const state = localState;
    const xs = state.shots.X.reduce((a,b)=>a+b,0);
    const os = state.shots.O.reduce((a,b)=>a+b,0);
    if (xs === os && !state.overtime) {
      state.overtime = true; state.phase = 'overtime_X';
      state.shots.X = []; state.shots.O = [];
      renderLocalGame(); return;
    }
    state.phase = 'done';
    renderLocalGame();
  }

  function renderLocalGame() {
    const state = localState;
    if (!state) return;
    const xs = state.shots.X.reduce((a,b)=>a+b,0);
    const os = state.shots.O.reduce((a,b)=>a+b,0);
    const limit = state.overtime ? SHOTS_PER_POS : SHOTS_PER_POS * 3;
    const isMyTurn = state.phase === 'X_shooting' || state.phase === 'overtime_X';
    const isCpuTurn = state.phase === 'O_shooting' || state.phase === 'overtime_O';
    const isDone = state.phase === 'done';

    document.getElementById('score-me').textContent = xs;
    document.getElementById('score-opp').textContent = os;
    document.getElementById('shots-me').textContent = `${state.shots.X.length}/${limit}`;
    document.getElementById('shots-opp').textContent = `${state.shots.O.length}/${limit}`;
    document.getElementById('score-card-me').classList.toggle('active', isMyTurn);
    document.getElementById('score-card-opp').classList.toggle('active', isCpuTurn);

    const posIdx = state.overtime ? 1 : getPosIndex(isMyTurn ? state.shots.X.length : state.shots.O.length);
    currentPos = posIdx;
    updatePositionBar(state.shots.X, state.overtime, isMyTurn || isDone);
    drawCourt(posIdx, false);

    const statusEl = document.getElementById('status-area');
    const shotBtn = document.getElementById('shot-btn');
    const nextBtn = document.getElementById('next-btn');

    if (isDone) {
      if (xs > os) statusEl.innerHTML = '<div class="status-win">🏆 ניצחת! המחשב ימשיך לחלום 😴</div>';
      else if (os > xs) statusEl.innerHTML = '<div class="status-lose">😔 המחשב ניצח! תמשיך לחלום 😴</div>';
      else statusEl.innerHTML = '<div class="status-win">🤝 תיקו!</div>';
      shotBtn.disabled = true; nextBtn.textContent = '🔄 משחק חדש'; nextBtn.style.display = 'block';
    } else if (isMyTurn) {
      const pos = state.overtime ? 'מרכז (הארכה)' : POSITIONS[posIdx];
      statusEl.innerHTML = `<div class="status-pill">📍 ${pos} — החזק וזרוק!</div>`;
      shotBtn.disabled = false; nextBtn.style.display = 'none';
    } else {
      statusEl.innerHTML = '<div class="status-pill">🤖 המחשב זורק...</div>';
      shotBtn.disabled = true; nextBtn.style.display = 'none';
    }
  }

  // ─── ONLINE ───
  async function doOnlineShot(p) {
    const snap = await get(ref(db, `rooms3/${roomCode}/game`));
    const state = snap.val() || newGameState();
    const phase = state.phase;
    const isMyPhase = (myRole==='X' && (phase==='X_shooting'||phase==='overtime_X')) ||
                      (myRole==='O' && (phase==='O_shooting'||phase==='overtime_O'));
    if (!isMyPhase || shooting) return;

    const shots = state.shots || { X:[], O:[] };
    const myArr = Array.isArray(shots[myRole]) ? shots[myRole] : Object.values(shots[myRole]||{});
    const limit = state.overtime ? SHOTS_PER_POS : SHOTS_PER_POS * 3;
    if (myArr.length >= limit) return;

    const posIdx = state.overtime ? 1 : getPosIndex(myArr.length);
    const scored = isScored(p, posIdx);

    shooting = true;
    showFlash(scored);
    animateShot(posIdx, scored, async () => {
      shooting = false;
      myArr.push(scored ? 1 : 0);
      shots[myRole] = myArr;

      let newPhase = phase;
      if (myArr.length >= limit) {
        const xArr = Array.isArray(shots.X) ? shots.X : Object.values(shots.X||{});
        const oArr = Array.isArray(shots.O) ? shots.O : Object.values(shots.O||{});
        if (phase === 'X_shooting') newPhase = 'O_shooting';
        else if (phase === 'O_shooting') {
          const xs = xArr.reduce((a,b)=>a+b,0), os = oArr.reduce((a,b)=>a+b,0);
          if (xs === os) { newPhase = 'overtime_X'; shots.X = []; shots.O = []; state.overtime = true; }
          else newPhase = 'done';
        }
        else if (phase === 'overtime_X') newPhase = 'overtime_O';
        else if (phase === 'overtime_O') newPhase = 'done';
      }
      await update(ref(db, `rooms3/${roomCode}/game`), { shots, phase: newPhase, overtime: !!state.overtime });
    });
  }

  function renderOnlineGame(state) {
    const shots = state.shots || { X:[], O:[] };
    const xArr = Array.isArray(shots.X) ? shots.X : Object.values(shots.X||{});
    const oArr = Array.isArray(shots.O) ? shots.O : Object.values(shots.O||{});
    const myArr = myRole==='X' ? xArr : oArr;
    const oppArr = myRole==='X' ? oArr : xArr;
    const myScore = myArr.reduce((a,b)=>a+b,0);
    const oppScore = oppArr.reduce((a,b)=>a+b,0);
    const limit = state.overtime ? SHOTS_PER_POS : SHOTS_PER_POS * 3;
    const phase = state.phase || 'X_shooting';
    const isMyTurn = (myRole==='X'&&(phase==='X_shooting'||phase==='overtime_X'))||
                     (myRole==='O'&&(phase==='O_shooting'||phase==='overtime_O'));
    const isDone = phase === 'done';

    document.getElementById('score-me').textContent = myScore;
    document.getElementById('score-opp').textContent = oppScore;
    document.getElementById('shots-me').textContent = `${myArr.length}/${limit}`;
    document.getElementById('shots-opp').textContent = `${oppArr.length}/${limit}`;
    document.getElementById('score-card-me').classList.toggle('active', isMyTurn);
    document.getElementById('score-card-opp').classList.toggle('active', !isMyTurn && !isDone);

    const posIdx = state.overtime ? 1 : getPosIndex(isMyTurn ? myArr.length : oppArr.length);
    updatePositionBar(myArr, state.overtime, isMyTurn || isDone);
    drawCourt(posIdx, false);

    const statusEl = document.getElementById('status-area');
    const shotBtn = document.getElementById('shot-btn');
    const nextBtn = document.getElementById('next-btn');

    if (isDone) {
      if (myScore > oppScore) statusEl.innerHTML = '<div class="status-win">🏆 ניצחת! החבר ימשיך לחלום 😴</div>';
      else if (oppScore > myScore) statusEl.innerHTML = '<div class="status-lose">😔 הפסדת! תמשיך לחלום 😴</div>';
      else statusEl.innerHTML = '<div class="status-win">🤝 תיקו!</div>';
      shotBtn.disabled = true; nextBtn.textContent = '🔄 משחק חדש'; nextBtn.style.display = 'block';
    } else if (isMyTurn) {
      const pos = state.overtime ? 'מרכז (הארכה)' : POSITIONS[posIdx];
      statusEl.innerHTML = `<div class="status-pill">📍 ${pos} — החזק וזרוק!</div>`;
      shotBtn.disabled = false; nextBtn.style.display = 'none';
    } else {
      statusEl.innerHTML = '<div class="status-pill">⏳ היריב זורק...</div>';
      shotBtn.disabled = true; nextBtn.style.display = 'none';
    }
  }

  function updatePositionBar(myShots, overtime, showMine) {
    if (overtime) {
      [0,1,2].forEach(i => {
        const el = document.getElementById(`pos-${i}`);
        el.className = 'pos-item' + (i===1 ? ' active' : ' done');
      });
      return;
    }
    [0,1,2].forEach(i => {
      const el = document.getElementById(`pos-${i}`);
      const start = i * SHOTS_PER_POS;
      const posShots = showMine ? myShots.slice(start, start + SHOTS_PER_POS) : [];
      const shotsInPos = myShots.length - start;
      const isCurrent = showMine && shotsInPos >= 0 && shotsInPos < SHOTS_PER_POS;
      const isDone = myShots.length > (i+1) * SHOTS_PER_POS - 1;
      el.className = 'pos-item' + (isCurrent && showMine && myShots.length < (i+1)*SHOTS_PER_POS ? ' active' : '') + (isDone ? ' done' : '');

      const dotsEl = document.getElementById(`dots-${i}`);
      dotsEl.innerHTML = '';
      for (let j = 0; j < SHOTS_PER_POS; j++) {
        const dot = document.createElement('div');
        dot.className = 'pos-dot';
        if (j < posShots.length) dot.classList.add(posShots[j] ? 'in' : 'out');
        else if (j === posShots.length && isCurrent && showMine) dot.classList.add('cur');
        dotsEl.appendChild(dot);
      }
    });
  }

  function showFlash(scored) {
    const flash = document.createElement('div');
    flash.className = 'result-flash ' + (scored ? 'scored' : 'missed-txt');
    flash.textContent = scored ? 'נכנס! 🎯' : 'פספוס!';
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 1000);
  }

  window.nextRound = async function() {
    if (vsComputer) {
      localState = newGameState();
      document.getElementById('shot-btn').disabled = false;
      document.getElementById('next-btn').style.display = 'none';
      renderLocalGame();
    } else {
      await update(ref(db, `rooms3/${roomCode}`), { game: newGameState(), emoji: null });
    }
  };

  window.sendEmoji = async function(emoji) {
    if (vsComputer) { showEmojiBubble(emoji, true); return; }
    await update(ref(db, `rooms3/${roomCode}/emoji`), { value: emoji, from: myRole, ts: Date.now() });
  };

  function handleEmojiUpdate(data) {
    if (!data || !data.ts) return;
    if (data.ts <= lastEmojiTs) return;
    lastEmojiTs = data.ts;
    showEmojiBubble(data.value, data.from === myRole);
  }

  function showEmojiBubble(emoji, isMe) {
    const el = document.createElement('div');
    el.className = 'emoji-bubble ' + (isMe ? 'mine' : 'theirs');
    el.textContent = emoji;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }

  window.leaveRoom = async function() {
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    if (roomCode) { await remove(ref(db, `rooms3/${roomCode}`)); roomCode = null; }
    myRole = null; vsComputer = false; localState = null;
    charging = false; shooting = false; clearInterval(chargeInterval);
    document.getElementById('lobby-err').textContent = '';
    history.replaceState({}, '', location.pathname);
    show('lobby');
  };

  // Auto-join
  (async function() {
    const params = new URLSearchParams(location.search);
    const roomParam = params.get('room');
    if (!roomParam) return;
    const snap = await get(ref(db, `rooms3/${roomParam}`));
    const errEl = document.getElementById('lobby-err');
    if (!snap.exists()) { errEl.textContent = 'חדר לא נמצא'; history.replaceState({}, '', location.pathname); return; }
    if (snap.val().status !== 'waiting') { errEl.textContent = 'החדר כבר מלא'; history.replaceState({}, '', location.pathname); return; }
    await update(ref(db, `rooms3/${roomParam}`), { status: 'playing' });
    roomCode = roomParam; myRole = 'O';
    history.replaceState({}, '', location.pathname);
    show('game'); initOnlineUI(); listenRoom();
  })();

  // Init court on load
  drawCourt(0, false);
</script>
</body>
</html>
